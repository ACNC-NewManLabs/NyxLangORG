name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux Multi-Architecture (Statically linked Musl)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
            artifact_name: nyx-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
            artifact_name: nyx-linux-arm64
          
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            artifact_name: nyx-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            artifact_name: nyx-macos-arm64
            
          # Windows (32-bit and 64-bit for broad compatibility including Windows 7)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            artifact_name: nyx-windows-x64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            use-cross: false
            artifact_name: nyx-windows-x86.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/nyx ${{ matrix.artifact_name }}
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}
        shell: bash

      - name: Prepare Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/nyx.exe ${{ matrix.artifact_name }}
          7z a ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }}
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
