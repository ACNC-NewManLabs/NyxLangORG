apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-registry
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nyx-registry
  template:
    metadata:
      labels:
        app: nyx-registry
    spec:
      containers:
        - name: registry
          image: nyxlang/registry:latest
          env:
            - name: NYX_REGISTRY_BIND
              value: "0.0.0.0:8090"
          ports:
            - containerPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: nyx-registry
spec:
  selector:
    app: nyx-registry
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090
