# Nyx DB SIMD acceleration: enable AVX2 and SSE4.2 on x86_64 for release builds.
# This allows the `wide` crate to use 256-bit AVX2 SIMD registers (4x f64 lanes).

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-feature=+avx2,+sse4.2,+bmi2"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-feature=+avx2,+sse4.2,+bmi2"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+avx2,+sse4.2,+bmi2"]
