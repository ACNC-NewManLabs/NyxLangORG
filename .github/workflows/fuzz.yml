name: Fuzzing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  fuzz-lexer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run lexer fuzz target
        run: |
          cd fuzz
          cargo fuzz run lexer -- -runs=5000
